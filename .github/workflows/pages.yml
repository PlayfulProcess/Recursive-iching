name: Deploy static wing to GitHub Pages

# Publishes ONLY public/ — the static reference viewers (viewers/books.html,
# viewers/caster.html) and the grammar mirror (grammars/*/grammar.json).
# The Next.js app itself (auth, /hexagram/[kw], /cast) needs a server and
# deploys on Vercel; Pages is the zero-dependency static wing of the same repo.
# (Enable once: Settings → Pages → Source = "GitHub Actions".)

on:
  push:
    branches: [main]
    paths:
      - 'public/**'
      - 'grammars/**'
      - '.github/workflows/pages.yml'
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deploy.outputs.page_url }}
    steps:
      - uses: actions/checkout@v4

      - name: Keep the grammar mirror fresh
        run: python3 scripts/sync_public.py

      - name: Add a landing index for the Pages artifact
        run: |
          cat > public/index.html <<'HTML'
          <!DOCTYPE html><html lang="en"><head><meta charset="utf-8">
          <meta name="viewport" content="width=device-width, initial-scale=1">
          <title>Recursive I Ching — static viewers</title>
          <link rel="stylesheet" href="theme.css"></head>
          <body style="font-family:Georgia,serif;max-width:640px;margin:8vh auto;padding:0 18px;line-height:1.7">
          <h1>The Recursive I Ching — static wing</h1>
          <p><a href="viewers/books.html">The Books</a> — one hexagram, many centuries.</p>
          <p><a href="viewers/caster.html">The Caster</a> — a cast is a path.</p>
          <p style="color:#7a7060;font-size:.9em">Grammar data: <code>grammars/&lt;slug&gt;/grammar.json</code>.
          The full app lives at the main site. Source:
          <a href="https://github.com/PlayfulProcess/Recursive-iching">GitHub</a>.</p>
          </body></html>
          HTML

      - uses: actions/configure-pages@v5
      - uses: actions/upload-pages-artifact@v3
        with:
          path: public
      - id: deploy
        uses: actions/deploy-pages@v4
